  <!-- Google Analytics — carregado com delay de 3s para não bloquear LCP -->
  <script>
    function loadGA() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-KKHZWCHSSN';
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-KKHZWCHSSN', { send_page_view: true });
    }
    // Carrega após interação do usuário OU após 3s — o que vier primeiro
    var _gaLoaded = false;
    function _loadGAOnce() {
      if (_gaLoaded) return;
      _gaLoaded = true;
      loadGA();
    }
    setTimeout(_loadGAOnce, 3000);
    ['click','scroll','keydown','touchstart'].forEach(function(e) {
      document.addEventListener(e, _loadGAOnce, { once: true, passive: true });
    });
  </script>

  <!-- CSS crítico inline (above-the-fold) — evita FOUC antes do bundle carregar -->
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:'Raleway',sans-serif;background:#fdf8f0;color:#3d2b1f}
    #root{min-height:100vh}
    /* Hero com <img> como LCP element */
    .hero-section--img{position:relative;height:70vh;min-height:420px;max-height:600px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;background:#1a0a00}
    .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.3));z-index:1}
    .hero-content{position:relative;z-index:2;padding:2rem 1rem;max-width:650px;margin:0 auto}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.375rem,5vw,3.25rem);font-weight:700;color:#fff;margin:0 0 .75rem;text-shadow:2px 2px 8px rgba(0,0,0,.7);line-height:1.15}
    .hero-subtitle{font-size:clamp(.875rem,2.5vw,1.25rem);color:#fff;margin:0 0 1.5rem;text-shadow:1px 1px 4px rgba(0,0,0,.7);opacity:.95}
    .hero-button-primary{background:linear-gradient(135deg,#D4A574,#C49464);color:#fff;font-weight:700;font-size:1rem;padding:0 2.5rem;height:44px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;text-transform:uppercase;letter-spacing:1px;box-shadow:0 10px 22px rgba(212,165,116,.35)}
    .hero-trust-signal{color:#fff;font-size:.9rem;margin:0;text-shadow:1px 1px 3px rgba(0,0,0,.6);opacity:.9;font-weight:500;background:rgba(0,0,0,.3);padding:.75rem 1.5rem;border-radius:25px}
    nav,header{position:sticky;top:0;z-index:100}
    /* font-display: swap para evitar FOIT */
    @font-face{font-family:'Raleway';font-display:swap}
    @font-face{font-family:'Playfair Display';font-display:swap}
    /* CLS: reservar espaço para imagens de produto antes de carregar */
    .product-image-wrapper{aspect-ratio:1/1;overflow:hidden;background:#f5f0ea;contain:layout}
    .product-image{width:100%;height:100%;object-fit:cover;display:block}
    .product-skeleton .skeleton-img{aspect-ratio:1/1;background:#ede8e0;border-radius:8px}
    /* CLS: skeleton cards com altura fixa */
    .product-skeleton{background:#fff;border-radius:12px;overflow:hidden}
    /* CLS: grid de produtos com colunas definidas antes do JS */
    .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
    @media(min-width:768px){.products-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:1024px){.products-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
